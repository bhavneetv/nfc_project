<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFC Productivity Mode</title>
  <style>
    :root {
      --bg-1: #f1f5f9;
      --bg-2: #cbd5e1;
      --card: rgba(255, 255, 255, 0.88);
      --ink: #0f172a;
      --sub: #334155;
      --study: #2563eb;
      --coding: #059669;
      --fun: #ea580c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Tahoma", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 20%, rgba(37, 99, 235, 0.18), transparent 35%),
        radial-gradient(circle at 85% 10%, rgba(5, 150, 105, 0.16), transparent 30%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .card {
      width: min(520px, 100%);
      background: var(--card);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 12px 40px rgba(15, 23, 42, 0.2);
      animation: rise 0.45s ease-out;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(18px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.65rem;
      letter-spacing: 0.3px;
    }

    p {
      margin: 0 0 18px;
      color: var(--sub);
      line-height: 1.45;
    }

    .grid {
      display: grid;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    button:active { transform: scale(0.98); }
    button:hover { filter: brightness(1.05); }

    .study { background: var(--study); }
    .coding { background: var(--coding); }
    .fun { background: var(--fun); }
    .stop { background: #7c3aed; }
    .notify { background: #0f766e; }

    .footer {
      margin-top: 14px;
      color: var(--sub);
      font-size: 0.88rem;
    }

    .row {
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }

    input {
      flex: 1;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 10px;
      font-size: 0.95rem;
    }

    @media (max-width: 460px) {
      .card { padding: 18px; }
      h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>NFC Productivity Tracker</h1>
    <p>Tap a mode to start. Tap Stop if your session is active. This page works when iPhone is locked.</p>

    <div class="row">
      <input id="userId" placeholder="User ID" />
    </div>

    <div class="grid" style="margin-top:12px;">
      <button id="enableNotificationsBtn" class="notify" onclick="enableNotifications()">Enable Notifications</button>
      <button class="study" onclick="startMode('study')">Study</button>
      <button class="coding" onclick="startMode('coding')">Coding</button>
      <button class="fun" onclick="startMode('fun')">Fun</button>
      <button class="stop" onclick="stopMode()">Stop</button>
    </div>

    <p class="footer" id="status">Ready</p>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
